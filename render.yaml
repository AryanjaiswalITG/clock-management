# Render Blueprint for the backend API.
# In Render: New + -> Blueprint -> connect this repo. Render reads this file,
# builds the service in ./server, and exposes it over HTTPS.
services:
  - type: web
    name: clock-management-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/settings
    envVars:
      - key: NODE_ENV
        value: production
      # Lock CORS to your GitHub Pages origin (scheme + host, no path/trailing slash).
      - key: CORS_ORIGIN
        value: https://aryanjaiswalitg.github.io
      # JWT signing secret — Render generates a strong random value once.
      - key: JWT_SECRET
        generateValue: true
