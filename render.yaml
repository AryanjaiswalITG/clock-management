# Render Blueprint — single web service that serves BOTH the React frontend
# and the Express API from one origin.
#
# In Render: New + -> Blueprint -> connect this repo -> Apply.
# Render builds the frontend (vite build -> ./dist), installs the server deps,
# then starts the server, which serves ./dist and the /api routes together.
services:
  - type: web
    name: clock-management
    runtime: node
    plan: free
    # Build the frontend, then install backend deps.
    # --include=dev forces devDependencies (vite, the build tool) to install even
    # though NODE_ENV=production is set below — otherwise `vite build` fails with
    # "vite: not found" (exit 127). vite is only needed at build time, not runtime.
    buildCommand: npm install --include=dev && npm run build && npm install --prefix server
    # Start the Express server (it serves ../dist and /api).
    startCommand: node server/index.js
    healthCheckPath: /api/settings
    envVars:
      - key: NODE_ENV
        value: production
      # JWT signing secret — Render generates a strong random value once.
      - key: JWT_SECRET
        generateValue: true
